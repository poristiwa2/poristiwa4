<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poristiwa — Portal Berita Terkini Indonesia</title>
    <meta name="description" content="Poristiwa.my.id — Sumber berita terkini, terpercaya, dan terlengkap Indonesia." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <style>
      body { margin: 0; font-family: 'Inter', system-ui, sans-serif; }
      #root-fallback { display: none; padding: 40px; text-align: center; font-size: 18px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="root-fallback">Memuat Poristiwa...</div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(function() {
        var r = document.getElementById('root');
        if (r && r.children.length === 0) {
          document.getElementById('root-fallback').style.display = 'block';
        }
      }, 5000);
    </script>
  </body>
</html>
